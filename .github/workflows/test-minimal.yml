name: Test Minimal

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Test echo
      run: echo "Hello from GitHub Actions!"

    - name: Test Node.js
      run: |
        node --version
        npm --version

    - name: List files
      run: ls -la