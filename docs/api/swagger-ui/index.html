<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Streaming API Documentation</title>
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
    <style>
        html {
            box-sizing: border-box;
            overflow: -moz-scrollbars-vertical;
            overflow-y: scroll;
        }
        
        *, *:before, *:after {
            box-sizing: inherit;
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }
        
        #swagger-ui {
            max-width: 1460px;
            margin: 0 auto;
        }
        
        .topbar {
            background-color: #1a1a2e;
        }
        
        .topbar .topbar-wrapper .link img {
            content: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🎬</text></svg>');
        }
        
        .swagger-ui .information-container .url {
            display: none;
        }
        
        .swagger-ui .information-container .title {
            font-size: 2rem;
            color: #1a1a2e;
        }
        
        .swagger-ui .information-container p {
            font-size: 1rem;
            color: #666;
        }
        
        .information-container {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .swagger-ui .opblock-tag {
            font-size: 1.2rem;
            color: #1a1a2e;
        }
        
        .swagger-ui .opblock.opblock-get {
            border-color: #49cc90;
            background: rgba(73, 204, 144, 0.1);
        }
        
        .swagger-ui .opblock.opblock-post {
            border-color: #49cc90;
            background: rgba(73, 204, 144, 0.1);
        }
        
        .swagger-ui .opblock.opblock-put {
            border-color: #fca130;
            background: rgba(252, 161, 48, 0.1);
        }
        
        .swagger-ui .opblock.opblock-delete {
            border-color: #f93e3e;
            background: rgba(249, 62, 62, 0.1);
        }
    </style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
    <div id="swagger-ui"></div>
    
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
    <script>
        window.onload = function() {
            // Initialize Swagger UI
            const ui = SwaggerUIBundle({
                url: "./openapi.yaml",
                dom_id: '#swagger-ui',
                presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIStandalonePreset
                ],
                plugins: [
                    SwaggerUIBundle.plugins.DownloadUrl
                ],
                layout: "StandaloneLayout",
                deepLinking: true,
                displayOperationId: true,
                displayRequestDuration: true,
                docExpansion: "list",
                filter: true,
                showExtensions: true,
                showCommonExtensions: true,
                syntaxHighlight: {
                    activate: true,
                    theme: "monokai"
                },
                tryItOutEnabled: false,
                requestSnippetsEnabled: true,
                requestSnippets: {
                    generators: {
                        "curl_curl": {
                            title: "cURL",
                            syntax: "bash"
                        },
                        "node_fetch": {
                            title: "Node.js",
                            syntax: "javascript"
                        },
                        "python_requests": {
                            title: "Python",
                            syntax: "python"
                        },
                        "rust_hyper": {
                            title: "Rust",
                            syntax: "rust"
                        }
                    },
                    defaultExpanded: true,
                    languages: ["curl", "node", "python", "rust"]
                }
            });
            
            window.ui = ui;
        }
    </script>
</body>
</html>
