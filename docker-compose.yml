version: '3.8'

services:
  vstreaming-dev:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: npm run dev

  vstreaming-test:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=test
    command: npm test

  vstreaming-lint:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run lint

  vstreaming-format:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run format